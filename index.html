<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amin Jafari | Senior Flutter Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Anton', 'Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
            },
            colors: {
              primary: '#3b82f6',
              secondary: '#6366f1',
              dark: '#0f172a',
              card: '#1e293b',
              paper: '#f3f3f3',
              ink: '#0a0a0a',
              'ink-soft': '#111111',
              'paper-soft': '#e5e5e5',
            }
          }
        }
      }
    </script>
    <style>
      html, body {
        background: #0a0a0a;
        color: #f3f3f3;
        overscroll-behavior: none;
      }

      /* Lenis smooth scroll baseline */
      html.lenis, html.lenis body {
        height: auto;
      }
      .lenis.lenis-smooth {
        scroll-behavior: auto !important;
      }
      .lenis.lenis-smooth [data-lenis-prevent] {
        overscroll-behavior: contain;
      }
      .lenis.lenis-stopped {
        overflow: hidden;
      }

      /* Custom scrollbar (subtle, monochrome) */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #0a0a0a;
      }
      ::-webkit-scrollbar-thumb {
        background: #2a2a2a;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #3a3a3a;
      }

      /* Reveal helper: title in overflow:hidden wrapper, inner span animated by GSAP */
      .reveal-mask {
        overflow: hidden;
        display: inline-block;
        line-height: 1;
      }
      .reveal-inner {
        display: inline-block;
        will-change: transform;
      }

      /* Hide image until GSAP fades it in (avoids flash on Process crossfade) */
      .gsap-fade-init {
        opacity: 0;
      }

      /* Selection */
      ::selection {
        background: #f3f3f3;
        color: #0a0a0a;
      }

      /* Accessible focus rings for keyboard users */
      :focus { outline: none; }
      :focus-visible {
        outline: 2px solid currentColor;
        outline-offset: 3px;
        border-radius: 4px;
      }
    </style>
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@^19.2.3",
        "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
        "react/": "https://esm.sh/react@^19.2.3/",
        "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
        "@google/genai": "https://esm.sh/@google/genai@^1.38.0",
        "gsap": "https://esm.sh/gsap@^3.15.0",
        "gsap/ScrollTrigger": "https://esm.sh/gsap@^3.15.0/ScrollTrigger",
        "lenis": "https://esm.sh/lenis@^1.3.23"
      }
    }
    </script>
    <link rel="stylesheet" href="/index.css">
  </head>
  <body class="bg-ink text-paper antialiased font-sans">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
